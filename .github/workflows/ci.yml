name: Pehlix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        run: npm audit --audit-level=critical
      
      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI_STAGING }}
          JWT_ACCESS_PRIVATE_KEY: ${{ secrets.JWT_ACCESS_PRIVATE_KEY }}
          JWT_ACCESS_PUBLIC_KEY: ${{ secrets.JWT_ACCESS_PUBLIC_KEY }}
          JWT_REFRESH_PRIVATE_KEY: ${{ secrets.JWT_REFRESH_PRIVATE_KEY }}
          JWT_SUPER_ADMIN_SECRET: ${{ secrets.JWT_SUPER_ADMIN_SECRET }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
      
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check for secrets in code
        run: |
          if grep -r "mongodb+srv://" src/ --include="*.js" --include="*.jsx" --include="*.ts" 2>/dev/null; then
            echo "CRITICAL: MongoDB connection string found in source code"
            exit 1
          fi
          if grep -r "sk_live_\|rk_live_" src/ --include="*.js" 2>/dev/null; then
            echo "CRITICAL: Razorpay live key found in source code"
            exit 1
          fi
          echo "Secret scan passed"
